<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <style>
        /* Define custom font from your absolute URL */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('/font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'MyCustomFont', sans-serif;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Remote Background Image */
            background-image: url('/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #ffffff;
            margin-bottom: 35px;
            font-size: 32px;
            letter-spacing: 1px;
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 15px;
            font-size: 18px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: 'MyCustomFont', sans-serif;
        }

        .btn:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: white;
            text-decoration: none;
            font-size: 15px;
            opacity: 0.7;
            transition: 0.3s;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
        }

        .back-link:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>LINKS</h1>
        
        <div class="link-container">
            <a href="https://drriyaj.uddinmondal.in" class="btn">Healthcare Portfolio</a>
            <a href="https://mrriyaj.uddinmondal.in" class="btn">Educational Portfolio</a>
        </div>

        <a href="https://riyaj.uddinmondal.in/" class="back-link">← Back to Home</a>
    </div>

</body>
</html>
